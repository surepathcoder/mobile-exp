name: expense_tracker
description: A complete production-ready expense tracker app.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^3.3.1
  dio: ^5.4.0
  shared_preferences: ^2.2.2
  intl: ^0.20.2
  image_picker: ^1.0.7
  equatable: ^2.0.5
  go_router: ^17.2.3
  flutter_svg: ^2.0.9
  flutter_secure_storage: ^10.3.0
  fl_chart: ^1.2.0
  file_picker: ^12.0.0-beta.4
  
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
